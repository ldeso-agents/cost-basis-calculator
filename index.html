<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cost Basis Calculator (Base)</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafafa;
      --fg: #111;
      --muted: #666;
      --border: #ddd;
      --accent: #0057ff;
      --pos: #0a7d2c;
      --neg: #b21f1f;
      --warn-bg: #fff7d6;
      --warn-fg: #6a4f00;
      --err: #b21f1f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --fg: #eee;
        --muted: #999;
        --border: #333;
        --accent: #6ea8ff;
        --pos: #4ade80;
        --neg: #f87171;
        --warn-bg: #3a2d00;
        --warn-fg: #ffe48a;
        --err: #f87171;
      }
    }
    * { box-sizing: border-box; }
    body {
      font: 14px/1.5 system-ui, -apple-system, sans-serif;
      margin-inline: auto;
      padding: 24px;
      max-width: 960px;
      background: var(--bg);
      color: var(--fg);
    }
    h1 { margin-top: 0; }
    p.intro { color: var(--muted); }
    form { display: grid; gap: 12px; margin-bottom: 16px; }
    label { display: grid; gap: 4px; font-weight: 600; }
    input[type="text"] {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
      background: var(--bg);
      color: var(--fg);
    }
    fieldset {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
    }
    fieldset legend { font-weight: 600; padding: 0 4px; }
    fieldset label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: normal;
      margin-right: 16px;
    }
    button {
      padding: 10px 16px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      justify-self: start;
    }
    button:disabled { opacity: 0.5; cursor: wait; }
    #status {
      min-height: 1.5em;
      padding: 8px 0;
      color: var(--muted);
    }
    #status[data-kind="error"] { color: var(--err); font-weight: 600; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0 24px;
    }
    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .pos { color: var(--pos); }
    .neg { color: var(--neg); }
    .muted { color: var(--muted); }
    .warn {
      background: var(--warn-bg);
      color: var(--warn-fg);
      padding: 8px 12px;
      border-radius: 6px;
      margin: 8px 0;
    }
    table.totals { max-width: 480px; }
    table.totals td:first-child { font-weight: 600; }
    a { color: var(--accent); }
    h2, h3 { margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>Cost Basis Calculator</h1>
  <p class="intro">
    Compute the cost basis of an ERC-20 token holding for a Base account.
    Everything runs in your browser; the API key never leaves this page.
  </p>

  <form id="form">
    <label>
      Account address
      <input id="account" type="text" placeholder="0x…" autocomplete="off" required />
    </label>
    <label>
      Token address
      <input id="token" type="text" placeholder="0x…" autocomplete="off" required />
    </label>
    <label>
      BASE_RPC_URL
      <input id="rpcUrl" type="text" placeholder="https://base-mainnet.g.alchemy.com/v2/…" autocomplete="off" required />
    </label>
    <label>
      ALCHEMY_API_KEY
      <input id="alchemyKey" type="text" placeholder="alchemy api key" autocomplete="off" required />
    </label>
    <fieldset>
      <legend>Method</legend>
      <label><input type="radio" name="method" value="fifo" checked /> FIFO</label>
      <label><input type="radio" name="method" value="lifo" /> LIFO</label>
      <label><input type="radio" name="method" value="average" /> Weighted average</label>
    </fieldset>
    <button id="go" type="submit">Calculate</button>
  </form>

  <div id="status"></div>
  <div id="results"></div>

  <script type="module" src="dist/bundle.js"></script>
</body>
</html>
